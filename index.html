<!DOCTYPE html>
<html class="scroll-smooth" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PB Academy | Professional Pickleball Coaching</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#1e6a51",
            "primary-container": "#6fb799",
            "on-surface": "#111d28",
            "on-surface-variant": "#3f4944",
            "on-secondary-container": "#576474",
            "outline-variant": "#bfc9c2",
            "surface": "#f7f9ff",
            "surface-container-low": "#edf4ff",
            "surface-container-lowest": "#ffffff",
            "secondary-container": "#d3e1f4"
          },
          fontFamily: {
            "headline": ["Space Grotesk", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.18/dist/lenis.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/intl-tel-input@22.0.2/build/css/intlTelInput.css"/>
  <style>
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .bg-kinetic-gradient { background: linear-gradient(135deg, #1e6a51 0%, #6fb799 100%); }

    /* Apple-like animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleUp {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes blurIn {
      from { opacity: 0; filter: blur(12px); transform: translateY(20px); }
      to { opacity: 1; filter: blur(0); transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .animate-fade-up    { animation: fadeUp    1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-fade-down  { animation: fadeDown  1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-scale-up   { animation: scaleUp   1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-blur-in    { animation: blurIn  1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-fade-in    { animation: fadeIn  1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .delay-100 { animation-delay: 100ms; }
    .delay-200 { animation-delay: 200ms; }
    .delay-300 { animation-delay: 300ms; }
    .delay-400 { animation-delay: 400ms; }
    .delay-500 { animation-delay: 500ms; }
    .delay-600 { animation-delay: 600ms; }
    .delay-700 { animation-delay: 700ms; }

    /* Scroll Animations */
    .scroll-animate {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .scroll-animate.in-view { opacity: 1; transform: translateY(0); }
    .stagger-1 { transition-delay: 100ms; }
    .stagger-2 { transition-delay: 200ms; }
    .stagger-3 { transition-delay: 300ms; }
    .stagger-4 { transition-delay: 400ms; }

    /* Apple-style Viewport Animations */
    .apple-animate {
      opacity: 0;
      transform: translateY(50px) scale(0.96);
      filter: blur(12px);
      transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 1.2s cubic-bezier(0.16, 1, 0.3, 1),
                  filter 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: opacity, transform, filter;
    }
    .apple-animate.in-view { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    .apple-animate-card {
      opacity: 0;
      transform: translateY(50px) scale(0.96);
      filter: blur(12px);
      will-change: opacity, transform, filter;
    }
    .apple-animate-card.in-view {
      animation: appleCardIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes appleCardIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }
    .apple-stagger-1 { transition-delay: 100ms; }
    .apple-stagger-2 { transition-delay: 250ms; }
    .apple-stagger-3 { transition-delay: 400ms; }
    .apple-stagger-4 { transition-delay: 550ms; }
    .apple-stagger-5 { transition-delay: 700ms; }
    .apple-stagger-6 { transition-delay: 850ms; }
    .apple-stagger-7 { transition-delay: 1000ms; }
    .apple-stagger-8 { transition-delay: 1150ms; }
    .apple-animate-card.apple-stagger-1 { animation-delay: 100ms; }
    .apple-animate-card.apple-stagger-2 { animation-delay: 250ms; }
    .apple-animate-card.apple-stagger-3 { animation-delay: 400ms; }
    .apple-animate-card.apple-stagger-4 { animation-delay: 550ms; }
    .apple-animate-card.apple-stagger-5 { animation-delay: 700ms; }
    .apple-animate-card.apple-stagger-6 { animation-delay: 850ms; }
    .apple-animate-card.apple-stagger-7 { animation-delay: 1000ms; }
    .apple-animate-card.apple-stagger-8 { animation-delay: 1150ms; }

    /* Apple-style FAQ Accordion */
    .faq-item {
      /* Remove border-b from last item usually, handled by layout if needed */
    }
    .faq-content {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.5s cubic-bezier(0.32, 0.72, 0, 1), opacity 0.5s cubic-bezier(0.32, 0.72, 0, 1);
      opacity: 0;
    }
    .faq-item.is-open .faq-content {
      grid-template-rows: 1fr;
      opacity: 1;
    }
    .faq-inner {
      overflow: hidden;
    }
    .faq-icon {
      transition: transform 0.5s cubic-bezier(0.32, 0.72, 0, 1), color 0.3s ease;
    }
    .faq-item.is-open .faq-icon {
      transform: rotate(45deg);
      color: #111d28; /* on-surface */
    }
    .faq-button:hover .faq-icon {
      color: #111d28;
    }
  </style>
</head>
<body class="bg-white text-gray-900 font-body antialiased selection:bg-primary-container selection:text-white">

  <!-- All sections are injected here by js/loader.js -->
  <div id="app-root"></div>

  <!-- External libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Flip.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

  <!-- JS modules — loaded in dependency order -->
  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/youtube.js"></script>
  <script src="js/playback.js"></script>
  <script src="js/annotations.js"></script>
  <script src="js/tabs.js"></script>
  <script src="js/technique.js"></script>
  <script src="js/comments.js"></script>
  <script src="js/keyboard.js"></script>
  <script src="js/scroll.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/intl-tel-input@22.0.2/build/js/intlTelInput.min.js"></script>
  <script src="js/waitlist.js"></script>
  <script src="js/faq.js"></script>
  <script src="js/intro.js"></script>
  <script src="js/init.js"></script>
  <!-- loader.js must come last: it triggers DOMContentLoaded → fetches sections → calls appInit() -->
  <script src="js/loader.js"></script>

  <!-- YouTube IFrame API — must load after youtube.js so onYouTubeIframeAPIReady is already defined -->
  <script src="https://www.youtube.com/iframe_api"></script>

</body>
</html>
