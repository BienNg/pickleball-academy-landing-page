<!-- ─── WAITLIST CTA ─── -->
<section class="py-40 px-6 bg-[#fbfbfd] text-center border-t border-gray-100 scroll-animate" id="waitlist">
  <div class="max-w-3xl mx-auto">
    <h2 class="text-5xl md:text-7xl font-bold tracking-tighter text-gray-900 mb-6 font-headline">Ready to level up?</h2>
    <p class="text-xl text-gray-500 mb-12 tracking-tight">Be the first to know when PB Academy launches.</p>

    <form class="flex flex-col sm:flex-row gap-4 justify-center max-w-2xl mx-auto" id="waitlistForm" novalidate>
      <input type="text" name="name" id="waitlistName" placeholder="Your Name"
        class="px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary w-full text-lg shadow-sm"
        required autocomplete="name" />
      <input type="tel" name="phone" id="waitlistPhone" placeholder="Phone Number"
        class="px-6 py-4 rounded-2xl border border-gray-200 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary w-full text-lg shadow-sm"
        required autocomplete="tel" />
      <button type="submit" class="bg-gray-900 text-white px-8 py-4 rounded-2xl text-lg font-medium hover:bg-gray-800 transition-colors whitespace-nowrap shadow-md">Join Waitlist</button>
    </form>
  </div>
</section>
