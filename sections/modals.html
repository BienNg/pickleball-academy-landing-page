<!-- ─── VIEW FRAME MODAL ─── -->
<div class="modal-backdrop" id="viewFrameModal" onclick="closeViewFrameModal()">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="viewFrameModalTitle">Frame Detail</span>
      <button class="modal-close-btn" onclick="closeViewFrameModal()" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-frame-area">
      <div class="modal-court-bg"></div>
      <svg style="position:absolute;inset:0;width:100%;height:100%;"
        viewBox="0 0 430 242" xmlns="http://www.w3.org/2000/svg">
        <rect x="0" y="0" width="430" height="130" fill="#5a9a78" opacity="0.55"/>
        <text x="55" y="80" fill="rgba(255,255,255,0.25)" font-size="18" font-weight="800"
          font-family="Arial">SWIN</text>
        <text x="340" y="80" fill="rgba(255,255,255,0.25)" font-size="18" font-weight="800"
          font-family="Arial">SWIN</text>
        <polygon points="0,135 430,135 350,242 80,242" fill="#4a8c62" opacity="0.55"/>
        <line x1="50" y1="108" x2="380" y2="108" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <rect x="55" y="108" width="320" height="120" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
        <line x1="215" y1="108" x2="215" y2="228" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
        <!-- Player silhouette -->
        <ellipse cx="295" cy="155" rx="12" ry="20" fill="rgba(0,0,0,0.6)"/>
        <circle cx="295" cy="130" r="9" fill="rgba(0,0,0,0.6)"/>
        <line x1="295" y1="148" x2="325" y2="158" stroke="rgba(0,0,0,0.55)" stroke-width="5"
          stroke-linecap="round"/>
        <ellipse cx="331" cy="160" rx="10" ry="6" fill="rgba(0,0,0,0.45)"
          transform="rotate(-15 331 160)"/>
        <line x1="290" y1="175" x2="283" y2="200" stroke="rgba(0,0,0,0.55)" stroke-width="5"
          stroke-linecap="round"/>
        <line x1="300" y1="175" x2="305" y2="200" stroke="rgba(0,0,0,0.55)" stroke-width="5"
          stroke-linecap="round"/>
      </svg>
      <svg class="modal-annotation-svg" viewBox="0 0 430 242" preserveAspectRatio="xMidYMid meet">
        <circle id="modalCircle" cx="295" cy="130" r="28"
          fill="none" stroke="#FF3B30" stroke-width="2.5" stroke-dasharray="7 4">
          <animateTransform attributeName="transform" type="rotate"
            from="0 295 130" to="360 295 130" dur="8s" repeatCount="indefinite"/>
        </circle>
        <circle cx="295" cy="130" r="22"
          fill="rgba(255,59,48,0.08)" stroke="rgba(255,59,48,0.35)" stroke-width="1"/>
      </svg>
    </div>
    <div class="modal-body">
      <div class="modal-frame-note" id="viewFrameModalNote"></div>
      <div class="modal-timestamp-badge" id="viewFrameModalBadge">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="#8FB9A8"><polygon points="5,3 19,12 5,21"/></svg>
        0:10
      </div>
    </div>
  </div>
</div>

<!-- ─── WAITLIST SUCCESS (Apple-style) ─── -->
<div class="modal-backdrop waitlist-success-modal" id="waitlistSuccessModal" role="dialog"
  aria-modal="true" aria-labelledby="waitlistSuccessTitle" aria-describedby="waitlistSuccessMessage"
  aria-hidden="true">
  <div class="waitlist-success-card" onclick="event.stopPropagation()">
    <div class="waitlist-success-icon" aria-hidden="true">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="24" cy="24" r="24" fill="url(#waitlistSuccessGrad)"/>
        <path d="M14 24.5L21 31.5L34 17" stroke="white" stroke-width="3.2" stroke-linecap="round"
          stroke-linejoin="round"/>
        <defs>
          <linearGradient id="waitlistSuccessGrad" x1="12" y1="8" x2="36" y2="40"
            gradientUnits="userSpaceOnUse">
            <stop stop-color="#34C759"/>
            <stop offset="1" stop-color="#30B350"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
    <h2 class="waitlist-success-title" id="waitlistSuccessTitle">You&rsquo;re on the list</h2>
    <p class="waitlist-success-message" id="waitlistSuccessMessage"></p>
    <button type="button" class="waitlist-success-btn" id="waitlistSuccessDismiss">Done</button>
  </div>
</div>

<!-- ─── TOAST ─── -->
<div class="toast" id="toast"></div>
